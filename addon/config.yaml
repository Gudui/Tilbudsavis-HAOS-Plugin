name: Offer Radar
slug: offer_radar
version: 0.1.0
description: Personal-use watched-offer dashboard for Danish catalogue providers
url: https://github.com/example/offer-radar
startup: application
boot: auto
init: false
arch:
  - aarch64
  - amd64
  - armv7
ingress: true
ingress_port: 8099
panel_icon: mdi:tag-search
panel_title: Offer Radar
map:
  - share:rw
options:
  provider: mock
  latitude: 55.6761
  longitude: 12.5683
  radius_meters: 25000
  locale: da_DK
  sync_interval_minutes: 0
  max_results_per_query: 24
  request_timeout_seconds: 12
  etilbudsavis_search_url: ""
schema:
  provider: "list(mock|etilbudsavis)"
  latitude: float
  longitude: float
  radius_meters: int(1000,100000)
  locale: str
  sync_interval_minutes: int(0,1440)
  max_results_per_query: int(1,100)
  request_timeout_seconds: int(1,60)
  etilbudsavis_search_url: str?

