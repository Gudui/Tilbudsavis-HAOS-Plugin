services:
  offer-radar:
    build:
      context: ./addon
      dockerfile: Dockerfile
    container_name: offer-radar-dev
    env_file:
      - .env
    ports:
      - "${OFFER_RADAR_PORT:-8099}:8099"
    volumes:
      - ./data:/data
    environment:
      PORT: "8099"
      OFFER_RADAR_DATA_DIR: /data
      OFFER_RADAR_OPTIONS_PATH: /data/options.json
      # Defaults are intentionally offline-safe for local development.
      OFFER_RADAR_PROVIDERS: ${OFFER_RADAR_PROVIDERS:-mock}
      OFFER_RADAR_PROVIDER: ${OFFER_RADAR_PROVIDER:-}
      OFFER_RADAR_LATITUDE: ${OFFER_RADAR_LATITUDE:-55.6761}
      OFFER_RADAR_LONGITUDE: ${OFFER_RADAR_LONGITUDE:-12.5683}
      OFFER_RADAR_RADIUS_METERS: ${OFFER_RADAR_RADIUS_METERS:-25000}
      OFFER_RADAR_LOCALE: ${OFFER_RADAR_LOCALE:-da_DK}
      OFFER_RADAR_SYNC_INTERVAL_MINUTES: ${OFFER_RADAR_SYNC_INTERVAL_MINUTES:-0}
      OFFER_RADAR_MAX_RESULTS_PER_QUERY: ${OFFER_RADAR_MAX_RESULTS_PER_QUERY:-24}
      OFFER_RADAR_PROVIDER_TIMEOUT_SECONDS: ${OFFER_RADAR_PROVIDER_TIMEOUT_SECONDS:-15}
      OFFER_RADAR_PROVIDER_RATE_LIMIT_SECONDS: ${OFFER_RADAR_PROVIDER_RATE_LIMIT_SECONDS:-2}
      OFFER_RADAR_PROVIDER_MAX_RETRIES: ${OFFER_RADAR_PROVIDER_MAX_RETRIES:-2}
      OFFER_RADAR_PROVIDER_USER_AGENT: ${OFFER_RADAR_PROVIDER_USER_AGENT:-OfferRadar/0.2 (+https://github.com/Gudui/Tilbudsavis-HAOS-Plugin; personal-use local add-on)}
      OFFER_RADAR_LIVE_PROVIDER_TESTS: ${OFFER_RADAR_LIVE_PROVIDER_TESTS:-false}
      ETILBUDSAVIS_BASE_URL: ${ETILBUDSAVIS_BASE_URL:-https://api.etilbudsavis.dk}
      ETILBUDSAVIS_SEARCH_URL: ${ETILBUDSAVIS_SEARCH_URL:-}
      ETILBUDSAVIS_LOCALE: ${ETILBUDSAVIS_LOCALE:-da_DK}
      ETILBUDSAVIS_RADIUS_METERS: ${ETILBUDSAVIS_RADIUS_METERS:-10000}
      ETILBUDSAVIS_MAX_RESULTS_PER_QUERY: ${ETILBUDSAVIS_MAX_RESULTS_PER_QUERY:-24}
      MINETILBUD_BASE_URL: ${MINETILBUD_BASE_URL:-https://minetilbud.dk}
      MINETILBUD_MAX_CATALOGS_PER_SYNC: ${MINETILBUD_MAX_CATALOGS_PER_SYNC:-50}
      MINETILBUD_STORE_FILTERS: ${MINETILBUD_STORE_FILTERS:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8099/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
