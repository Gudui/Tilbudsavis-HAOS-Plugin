name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r addon/requirements.txt

      - name: Compile application
        env:
          PYTHONPATH: addon
        run: python -m compileall addon/app tests

      - name: Run pytest
        env:
          PYTHONPATH: addon
        run: pytest -q

      - name: Build add-on image
        run: docker build ./addon

